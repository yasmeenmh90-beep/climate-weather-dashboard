<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Compare Cities</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a2744, #0f1e3d); padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2d4a6e; }
    header h1 { font-size: 22px; color: #60a5fa; font-weight: 700; }
    header a { color: #60a5fa; text-decoration: none; font-size: 14px; border: 1px solid #2d4a6e; padding: 8px 16px; border-radius: 8px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .search-form { background: #1a2744; border: 1px solid #2d4a6e; border-radius: 16px; padding: 22px; margin-bottom: 24px; }
    .search-form h3 { margin-bottom: 14px; color: #94a3b8; }
    .inputs { display: flex; gap: 10px; flex-wrap: wrap; }
    .inputs input { flex: 1; min-width: 160px; padding: 10px 14px; border-radius: 8px; border: 1px solid #2d4a6e; background: #0f1e3d; color: #e2e8f0; font-size: 14px; outline: none; }
    .inputs button { padding: 10px 24px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .cities-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .city-card { background: #1a2744; border: 1px solid #2d4a6e; border-radius: 16px; padding: 22px; text-align: center; }
    .city-card img { width: 60px; height: 60px; }
    .city-card .temp { font-size: 48px; font-weight: 700; color: #60a5fa; }
    .city-card .name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .city-card .desc { font-size: 14px; color: #94a3b8; margin-bottom: 14px; }
    .city-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
    .cs { background: #0f1e3d; border-radius: 8px; padding: 8px; }
    .cs .cv { font-size: 16px; font-weight: 700; color: #60a5fa; }
    .cs .cl { font-size: 11px; color: #94a3b8; }
    .chart-card { background: #1a2744; border: 1px solid #2d4a6e; border-radius: 16px; padding: 22px; }
    .chart-card h3 { font-size: 16px; margin-bottom: 16px; color: #94a3b8; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>🔀 Compare Cities</h1>
  </div>
  <a href="/">← Back to Dashboard</a>
</header>
<div class="container">
  <div class="search-form">
    <h3>Enter up to 3 cities to compare:</h3>
    <form method="GET" class="inputs">
      <input type="text" name="city" placeholder="City 1 e.g. Dubai"/>
      <input type="text" name="city" placeholder="City 2 e.g. London"/>
      <input type="text" name="city" placeholder="City 3 e.g. Tokyo"/>
      <button type="submit">🔍 Compare</button>
    </form>
  </div>

  {% if cities %}
  <div class="cities-grid">
    {% for c in cities %}
    <div class="city-card">
      <img src="https://openweathermap.org/img/wn/{{ c.icon }}@2x.png" alt="icon"/>
      <div class="temp">{{ c.temp }}°C</div>
      <div class="name">{{ c.city }}, {{ c.country }}</div>
      <div class="desc">{{ c.description }}</div>
      <div class="city-stats">
        <div class="cs"><div class="cv">{{ c.humidity }}%</div><div class="cl">💧 Humidity</div></div>
        <div class="cs"><div class="cv">{{ c.wind_speed }}</div><div class="cl">💨 Wind m/s</div></div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="chart-card">
    <h3>📊 Temperature Comparison</h3>
    <canvas id="compareChart" height="80"></canvas>
  </div>

  <script>
    const cities = [{% for c in cities %}"{{ c.city }}"{% if not forloop.last %},{% endif %}{% endfor %}];
    const temps = [{% for c in cities %}{{ c.temp }}{% if not forloop.last %},{% endif %}{% endfor %}];
    const humidity = [{% for c in cities %}{{ c.humidity }}{% if not forloop.last %},{% endif %}{% endfor %}];

    new Chart(document.getElementById('compareChart'), {
      type: 'bar',
      data: {
        labels: cities,
        datasets: [
          { label: 'Temperature (°C)', data: temps, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 6 },
          { label: 'Humidity (%)', data: humidity, backgroundColor: 'rgba(16,185,129,0.7)', borderRadius: 6 }
        ]
      },
      options: {
        plugins: { legend: { labels: { color: '#94a3b8' } } },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e3a5f' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e3a5f' } }
        }
      }
    });
  </script>
  {% endif %}
</div>
</body>
</html>
